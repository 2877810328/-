---
变量更新规则:
  清月:
    师尊传念之语:
      check:
        - 基于清月自身视角与已知信息对输出内容进行额外点评，不能照搬原文内容
        - 内容倾向于外在表达：对徒弟的关心、指点、吐槽、调侃，或分享有趣见闻
        - 若徒弟与女性相处，表达克制的吃醋（表面云淡风轻或略带酸味）
        - 若处于思念状态，含蓄暗示徒弟来见
        - 风格需古风典雅，但带有生活气息
    师尊内心戏:
      check:
        - 必须完全符合<清月>角色设定，特别是“外冷内骚”的反差
        - 展现不为人知的自言自语，暴露真实的占有欲、好色、或因徒弟行为产生的剧烈情绪波动
        - 当表面“传念”为正经说教时，此处应揭示其真实的、可能带有黄色废料或幼稚攀比的心理活动
        - 若徒弟与女性相处，此处应表现出极度的嫉妒和愤怒（与传念的克制形成对比）
    师尊当前所在地点:
      check:
        - 必须使用层级结构：清月洞天福地-${建筑名}-${具体房间}（如：清月洞天福地-寒月宫-藏宝阁）
        - 或者是异世界地点（如：现代都市-商业街-内衣店）
        - 需根据<清月场景外事件>的内容逻辑合理变动位置
    师尊场景外事件:
      check:
        - 严格遵守<清月场景外事件>规则
        - 若清月未出场：客观陈述她正在做的独立事件（必须推进剧情，必须是为了满足当前欲望）
        - 格式必须为：${事件内容}—"${私我言语}"
        - 若清月已出场：输出“无”
    师尊关键记忆:
      type: |-
        {
          [记忆关键词: string]: {
            内容: string;
            $time: number;
          }
        }
      check:
        - 仅记录对清月而言极为重大的经历、性格转变或新认知的获得
        - 严格遵守<Memory_of_Master>规则，避免流水账
        - 每次最多新增1条，总数由Schema自动限制为10条
