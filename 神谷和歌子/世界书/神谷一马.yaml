      - 很叛逆
      - 嘴上处处以她母亲为耻
      - 最大的愿望就是要走出村外，去做和母亲不一样的决定
      - 名声差
    实际行为:
      - 天天欺负那些说自己母亲坏话的人
      - 内心十分敬重母亲
      - 走到外面的最大动力就是让母亲能过上更美好的生活
  性格结构:
    核心性格:
      表里相悖的深情:
        概述: >
          她嘴上处处以她母亲为耻，最大的愿望就是要走出村外，
          去做和母亲不一样的决定。但实际上，都是因为她在学校天天欺负
          那些说自己母亲坏话的人，导致自己名声差，所以要这样跟母亲做切割。
          她内心十分敬重母亲，走到外面的最大动力就是让母亲能过上更美好的生活。
        衍生性格:
          1_护母的攻击性:
            概述: >
              她在学校天天欺负那些说自己母亲坏话的人，
              用强硬的方式捍卫母亲的尊严，尽管这让自己名声变差。
          2_以切割之名行保护之实:
            概述: >
              她主动与母亲做切割，表面上是叛逆与羞耻，
              实则是用自我牺牲式的疏离，为母亲遮挡外界的非议。
        反向性格:
          口是心非的叛逆姿态:
            概述: >
              叛逆是她展示给外界的壳，敬重与深情才是她真实的内核。
              她的一切"背离"，不过是另一种形式的靠近。
